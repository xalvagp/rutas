<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rutas en Bici — Perfiles de Elevación</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --card: #1e2130;
    --border: #2a2f45;
    --accent: #f97316;
    --accent2: #fb923c;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --gain: #22c55e;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
  }

  header {
    background: linear-gradient(135deg, #1a1d27 0%, #0f1117 100%);
    border-bottom: 1px solid var(--border);
    padding: 2rem 2rem 1.5rem;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(10px);
  }

  header h1 {
    font-size: 1.8rem;
    font-weight: 700;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
  }

  header p {
    color: var(--muted);
    margin-top: 0.3rem;
    font-size: 0.9rem;
  }

  .controls {
    display: flex;
    gap: 1rem;
    margin-top: 1rem;
    flex-wrap: wrap;
    align-items: center;
  }

  .search {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.5rem 1rem;
    color: var(--text);
    font-size: 0.9rem;
    width: 260px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search:focus { border-color: var(--accent); }

  .sort-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.5rem 1rem;
    color: var(--muted);
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .sort-btn:hover, .sort-btn.active {
    border-color: var(--accent);
    color: var(--accent);
  }

  .stats-bar {
    display: flex;
    gap: 2rem;
    margin-top: 0.8rem;
    flex-wrap: wrap;
  }
  .stat-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.8rem;
    color: var(--muted);
  }
  .stat-item strong { color: var(--text); }

  main {
    padding: 2rem;
    max-width: 1600px;
    margin: 0 auto;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 1.5rem;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    cursor: pointer;
  }
  .card:hover {
    transform: translateY(-3px);
    border-color: var(--accent);
    box-shadow: 0 8px 32px rgba(249,115,22,0.15);
  }
  .card.hidden { display: none; }

  .card-header {
    padding: 1rem 1.2rem 0.6rem;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 0.5rem;
  }

  .card-title {
    font-size: 1rem;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
  }

  .card-meta {
    display: flex;
    gap: 0.8rem;
    padding: 0 1.2rem 0.6rem;
    flex-wrap: wrap;
  }

  .badge {
    font-size: 0.75rem;
    padding: 0.2rem 0.6rem;
    border-radius: 20px;
    font-weight: 500;
  }
  .badge-km {
    background: rgba(249,115,22,0.15);
    color: var(--accent);
    border: 1px solid rgba(249,115,22,0.3);
  }
  .badge-gain {
    background: rgba(34,197,94,0.12);
    color: var(--gain);
    border: 1px solid rgba(34,197,94,0.25);
  }
  .badge-ele {
    background: rgba(148,163,184,0.1);
    color: var(--muted);
    border: 1px solid rgba(148,163,184,0.2);
  }

  .chart-container {
    padding: 0 0.8rem 1rem;
    height: 160px;
    position: relative;
  }

  .card-footer {
    border-top: 1px solid var(--border);
    padding: 0.6rem 1.2rem;
    display: flex;
    gap: 1.5rem;
    font-size: 0.75rem;
    color: var(--muted);
  }
  .card-footer span { display: flex; align-items: center; gap: 0.3rem; }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 200;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    width: min(900px, 95vw);
    max-height: 90vh;
    overflow-y: auto;
    padding: 2rem;
    position: relative;
  }

  .modal-close {
    position: absolute;
    top: 1rem;
    right: 1rem;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 50%;
    width: 32px;
    height: 32px;
    cursor: pointer;
    font-size: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.2s;
  }
  .modal-close:hover { border-color: var(--accent); color: var(--accent); }

  .modal h2 {
    font-size: 1.5rem;
    margin-bottom: 1rem;
    padding-right: 2.5rem;
  }

  .modal-stats {
    display: flex;
    gap: 1.5rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }

  .modal-stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0.8rem 1.2rem;
    text-align: center;
    flex: 1;
    min-width: 100px;
  }
  .modal-stat .val {
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--accent);
  }
  .modal-stat .lbl {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 0.2rem;
  }

  .modal-chart-container {
    height: 300px;
    position: relative;
  }

  @media (max-width: 600px) {
    main { padding: 1rem; }
    .grid { grid-template-columns: 1fr; }
    header { padding: 1rem; }
    header h1 { font-size: 1.4rem; }
  }
</style>
</head>
<body>

<header>
  <h1>&#x1F6B4; Rutas en Bici</h1>
  <p>Perfiles de elevación de todas las rutas</p>
  <div class="controls">
    <input class="search" type="text" placeholder="Buscar ruta..." id="searchInput" oninput="filterRoutes()">
    <button class="sort-btn active" onclick="sortRoutes('name')" id="sort-name">A–Z</button>
    <button class="sort-btn" onclick="sortRoutes('km')" id="sort-km">Distancia</button>
    <button class="sort-btn" onclick="sortRoutes('gain')" id="sort-gain">Desnivel</button>
  </div>
  <div class="stats-bar">
    <div class="stat-item">&#x1F5FA; <strong id="total-routes">—</strong> rutas</div>
    <div class="stat-item">&#x1F4CD; Total: <strong id="total-km">—</strong> km</div>
    <div class="stat-item">&#x26F0; Desnivel total: <strong id="total-gain">—</strong> m</div>
  </div>
</header>

<main>
  <div class="grid" id="routeGrid"></div>
</main>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h2 id="modal-title"></h2>
    <div class="modal-stats" id="modal-stats"></div>
    <div class="modal-chart-container">
      <canvas id="modalChart"></canvas>
    </div>
  </div>
</div>

let currentSort = 'name';
let modalChartInstance = null;
const miniCharts = {};

function calcStats() {
  const totalKm = ROUTES.reduce((s,r) => s+r.total_km, 0);
  const totalGain = ROUTES.reduce((s,r) => s+r.gain, 0);
  document.getElementById('total-routes').textContent = ROUTES.length;
  document.getElementById('total-km').textContent = totalKm.toLocaleString('es', {maximumFractionDigits:0});
  document.getElementById('total-gain').textContent = totalGain.toLocaleString('es');
}

function getGradient(ctx, chartArea, minEle, maxEle) {
  const gradient = ctx.createLinearGradient(0, chartArea.top, 0, chartArea.bottom);
  gradient.addColorStop(0, 'rgba(249,115,22,0.6)');
  gradient.addColorStop(1, 'rgba(249,115,22,0.03)');
  return gradient;
}

function createMiniChart(canvasId, route) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: route.distances,
      datasets: [{
        data: route.elevations,
        borderColor: '#f97316',
        borderWidth: 1.5,
        pointRadius: 0,
        fill: true,
        backgroundColor: function(context) {
          const chart = context.chart;
          const {ctx: c, chartArea} = chart;
          if (!chartArea) return 'rgba(249,115,22,0.2)';
          return getGradient(c, chartArea, route.min_ele, route.max_ele);
        },
        tension: 0.3,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      plugins: { legend: { display: false }, tooltip: { enabled: false } },
      scales: {
        x: { display: false },
        y: {
          display: true,
          grid: { color: 'rgba(255,255,255,0.04)', drawBorder: false },
          ticks: { color: '#64748b', font: { size: 9 }, maxTicksLimit: 4,
            callback: v => v + 'm'
          },
          border: { display: false },
        }
      }
    }
  });
  miniCharts[canvasId] = chart;
}

function openModal(idx) {
  const r = ROUTES[idx];
  document.getElementById('modal-title').textContent = r.name;
  document.getElementById('modal-stats').innerHTML = `
    <div class="modal-stat"><div class="val">${r.total_km}</div><div class="lbl">km totales</div></div>
    <div class="modal-stat"><div class="val">+${r.gain.toLocaleString('es')}</div><div class="lbl">desnivel positivo</div></div>
    <div class="modal-stat"><div class="val">${r.min_ele}</div><div class="lbl">alt. mínima (m)</div></div>
    <div class="modal-stat"><div class="val">${r.max_ele}</div><div class="lbl">alt. máxima (m)</div></div>
  `;

  if (modalChartInstance) { modalChartInstance.destroy(); }
  const ctx = document.getElementById('modalChart').getContext('2d');
  modalChartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels: r.distances,
      datasets: [{
        label: 'Elevación (m)',
        data: r.elevations,
        borderColor: '#f97316',
        borderWidth: 2,
        pointRadius: 0,
        fill: true,
        backgroundColor: function(context) {
          const chart = context.chart;
          const {ctx: c, chartArea} = chart;
          if (!chartArea) return 'rgba(249,115,22,0.25)';
          return getGradient(c, chartArea, r.min_ele, r.max_ele);
        },
        tension: 0.3,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          mode: 'index',
          intersect: false,
          backgroundColor: '#1e2130',
          borderColor: '#2a2f45',
          borderWidth: 1,
          titleColor: '#94a3b8',
          bodyColor: '#f97316',
          callbacks: {
            title: items => items[0].label + ' km',
            label: item => ' ' + item.raw + ' m',
          }
        }
      },
      scales: {
        x: {
          grid: { color: 'rgba(255,255,255,0.04)' },
          ticks: {
            color: '#64748b',
            maxTicksLimit: 10,
            callback: v => v + ' km',
          },
          border: { color: '#2a2f45' },
        },
        y: {
          grid: { color: 'rgba(255,255,255,0.04)' },
          ticks: { color: '#64748b', callback: v => v + ' m' },
          border: { color: '#2a2f45' },
        }
      },
      interaction: { mode: 'nearest', axis: 'x', intersect: false },
    }
  });

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(event) {
  if (event && event.target !== document.getElementById('modalOverlay')) return;
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

function renderGrid(list) {
  const grid = document.getElementById('routeGrid');
  grid.innerHTML = '';
  list.forEach((r, i) => {
    const idx = ROUTES.indexOf(r);
    const id = 'chart-' + idx;
    const card = document.createElement('div');
    card.className = 'card';
    card.onclick = () => openModal(idx);
    card.innerHTML = `
      <div class="card-header">
        <div class="card-title">${r.name}</div>
      </div>
      <div class="card-meta">
        <span class="badge badge-km">&#x1F4CD; ${r.total_km} km</span>
        <span class="badge badge-gain">&#x26F0; +${r.gain.toLocaleString('es')} m</span>
        <span class="badge badge-ele">${r.min_ele} – ${r.max_ele} m</span>
      </div>
      <div class="chart-container">
        <canvas id="${id}"></canvas>
      </div>
    `;
    grid.appendChild(card);
    requestAnimationFrame(() => createMiniChart(id, r));
  });
}

function sortRoutes(by) {
  currentSort = by;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('sort-' + by).classList.add('active');
  filterRoutes();
}

function filterRoutes() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  let list = ROUTES.filter(r => r.name.toLowerCase().includes(q));
  if (currentSort === 'km') list.sort((a,b) => b.total_km - a.total_km);
  else if (currentSort === 'gain') list.sort((a,b) => b.gain - a.gain);
  else list.sort((a,b) => a.name.localeCompare(b.name, 'es'));
  renderGrid(list);
}

calcStats();
filterRoutes();
